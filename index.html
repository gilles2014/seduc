<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Classificação de Candidatos</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f7f6;
    display:flex;
    justify-content:center;
    padding:40px;
}

.container{
    background:white;
    padding:2rem;
    border-radius:8px;
    box-shadow:0 4px 6px rgba(0,0,0,0.1);
    width:100%;
    max-width:1000px;
}

textarea{
    width:100%;
    height:180px;
    padding:10px;
    border:1px solid #ddd;
    border-radius:4px;
    resize:vertical;
    font-family:monospace;
}

input{
    width:100%;
    padding:8px;
    margin-top:15px;
    border:1px solid #ccc;
    border-radius:4px;
}

button{
    background:#28a745;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:4px;
    cursor:pointer;
    margin-top:10px;
    margin-right:5px;
}

button:hover{
    background:#218838;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:left;
}

th{
    background:#f1f1f1;
}

.hint{
    font-size:0.85rem;
    color:#666;
}
</style>
</head>

<body>

<div class="container">

<h2>Classificação de Candidatos</h2>

<p class="hint">
Cole os dados no formato:<br>
Inscrição, Nome, P1, P2, Nota Final / Inscrição, Nome, P1, P2, Nota Final
</p>

<textarea id="inputText"></textarea>

<br>

<button onclick="processar()">Processar Lista</button>
<button onclick="downloadCSV()">Baixar CSV</button>
<button onclick="downloadXLS()">Baixar XLS</button>

<input type="text" id="busca" placeholder="Buscar por nome ou inscrição..." onkeyup="filtrarTabela()">

<div id="tabelaResultado"></div>

</div>

<script>

let candidatosOrdenados = [];

function processar(){

    const rawText = document.getElementById("inputText").value.trim();

    if(!rawText){
        alert("Cole os dados primeiro.");
        return;
    }

    const candidatos = rawText.split("/")
        .map(c => c.trim())
        .filter(c => c.length > 0)
        .map(linha => {

            const partes = linha.split(",").map(p => p.trim());

            return {
                inscricao: partes[0],
                nome: partes[1],
                p1: parseFloat(partes[2]),
                p2: parseFloat(partes[3]),
                final: parseFloat(partes[4])
            };

        });

    candidatos.sort((a,b)=> b.final - a.final);

    candidatosOrdenados = candidatos;

    mostrarTabela(candidatosOrdenados);

}

function mostrarTabela(lista){

    let html = `
    <table id="tabelaCandidatos">
    <thead>
    <tr>
        <th>Classificação</th>
        <th>Inscrição</th>
        <th>Nome</th>
        <th>P1</th>
        <th>P2</th>
        <th>Nota Final</th>
    </tr>
    </thead>
    <tbody>
    `;

    lista.forEach((c,i)=>{

        html += `
        <tr>
            <td>${i+1}</td>
            <td>${c.inscricao}</td>
            <td>${c.nome}</td>
            <td>${c.p1.toFixed(2)}</td>
            <td>${c.p2.toFixed(2)}</td>
            <td><strong>${c.final.toFixed(2)}</strong></td>
        </tr>
        `;

    });

    html += "</tbody></table>";

    document.getElementById("tabelaResultado").innerHTML = html;

}

function filtrarTabela(){

    const termo = document.getElementById("busca").value.toLowerCase();

    const filtrados = candidatosOrdenados.filter(c =>
        c.nome.toLowerCase().includes(termo) ||
        c.inscricao.toLowerCase().includes(termo)
    );

    mostrarTabela(filtrados);

}

function gerarCSV(){

    let csv = "Classificacao,Inscricao,Nome,P1,P2,Nota Final\n";

    candidatosOrdenados.forEach((c,i)=>{

        csv += `${i+1},${c.inscricao},${c.nome},${c.p1},${c.p2},${c.final}\n`;

    });

    return csv;

}

function downloadCSV(){

    if(candidatosOrdenados.length === 0){
        alert("Processe a lista primeiro.");
        return;
    }

    const csv = gerarCSV();

    const blob = new Blob(["\ufeff"+csv], {type:"text/csv;charset=utf-8;"});

    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "classificacao_candidatos.csv";
    link.click();

}

function downloadXLS(){

    if(candidatosOrdenados.length === 0){
        alert("Processe a lista primeiro.");
        return;
    }

    let tabela = `
    <table>
    <tr>
        <th>Classificação</th>
        <th>Inscrição</th>
        <th>Nome</th>
        <th>P1</th>
        <th>P2</th>
        <th>Nota Final</th>
    </tr>
    `;

    candidatosOrdenados.forEach((c,i)=>{

        tabela += `
        <tr>
            <td>${i+1}</td>
            <td>${c.inscricao}</td>
            <td>${c.nome}</td>
            <td>${c.p1}</td>
            <td>${c.p2}</td>
            <td>${c.final}</td>
        </tr>
        `;

    });

    tabela += "</table>";

    const blob = new Blob([tabela], {type:"application/vnd.ms-excel"});

    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "classificacao_candidatos.xls";
    link.click();

}

</script>

</body>
</html>
```
