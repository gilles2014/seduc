<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Classificação de Candidatos</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f7f6;
    display:flex;
    justify-content:center;
    padding:40px;
}

.container{
    background:white;
    padding:2rem;
    border-radius:8px;
    box-shadow:0 4px 6px rgba(0,0,0,0.1);
    width:100%;
    max-width:1100px;
}

textarea{
    width:100%;
    height:180px;
    padding:10px;
    border:1px solid #ddd;
    border-radius:4px;
    resize:vertical;
    font-family:monospace;
}

input{
    width:100%;
    padding:8px;
    margin-top:15px;
    border:1px solid #ccc;
    border-radius:4px;
}

button{
    background:#28a745;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:4px;
    cursor:pointer;
    margin-top:10px;
    margin-right:5px;
}

button:hover{
    background:#218838;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:left;
}

th{
    background:#f1f1f1;
}

.warning-hint {
    font-size:0.85rem;
    color: #d35400;
    font-weight: bold;
    margin-bottom: 10px;
    display: block;
}
</style>
</head>

<body>

<div class="container">

<h2>Classificação de Candidatos</h2>

<span class="warning-hint">
    Critérios Aplicados: <br>
    1. Apenas candidatos com P4 ≥ 5.0 aparecem. <br>
    2. Classificação baseada na maior Nota Final. <br>
    3. Empate decidido pela maior nota em P4.
</span>

<textarea id="inputText" placeholder="Inscrição, Nome, P1, P2, P3, P4 / ..."></textarea>

<br>

<button onclick="processar()">Gerar Classificação</button>
<button onclick="downloadCSV()">Baixar CSV</button>
<button onclick="downloadXLS()">Baixar XLS</button>

<input type="text" id="busca" placeholder="Buscar por nome ou inscrição..." onkeyup="filtrarTabela()">

<div id="tabelaResultado"></div>

</div>

<script>

let candidatosOrdenados = [];

function processar(){

    const rawText = document.getElementById("inputText").value.trim();

    if(!rawText){
        alert("Por favor, cole os dados antes de processar.");
        return;
    }

    // 1. Transformação dos dados
    const candidatos = rawText.split("/")
        .map(c => c.trim())
        .filter(c => c.length > 0)
        .map(linha => {
            const partes = linha.split(",").map(p => p.trim());
            
            const n3 = parseFloat(partes[4]) || 0;
            const n4 = parseFloat(partes[5]) || 0;
            const n5 = 0; // Constante conforme regra
            const n6 = 0; // Constante conforme regra
            
            // NF = (4*P3 + 2*P4 + 3*P5 + P6)/10
            const notaFinal = ((4 * n3) + (2 * n4) + (3 * n5) + n6) / 10;
            
            return {
                inscricao: partes[0],
                nome: partes[1],
                p1: parseFloat(partes[2]) || 0,
                p2: parseFloat(partes[3]) || 0,
                p3: n3,
                p4: n4,
                final: notaFinal 
            };
        })
        // 2. FILTRO DE CORTE: Se P4 for menor que 5
        .filter(c => c.p4 >= 5);

    // 3. ORDENAÇÃO: Prioridade para a maior Nota Final
    candidatos.sort((a, b) => {
        if (Math.abs(b.final - a.final) > 0.0001) {
            return b.final - a.final;
        }
        return b.p4 - a.p4;
    });

    candidatosOrdenados = candidatos;
    mostrarTabela(candidatosOrdenados);

    if(candidatosOrdenados.length === 0) {
        alert("Aviso: Nenhum candidato atingiu o critério de P4 >= 5.0");
    }
}

function mostrarTabela(lista){
    let html = `
    <table id="tabelaCandidatos">
    <thead>
    <tr>
        <th>Posição</th>
        <th>Inscrição</th>
        <th>Nome</th>
        <th>P1</th>
        <th>P2</th>
        <th>P3</th>
        <th>P4</th>
        <th>Nota Final</th>
    </tr>
    </thead>
    <tbody>
    `;

    lista.forEach((c, i) => {
        html += `
        <tr>
            <td><strong>${i+1}º</strong></td>
            <td>${c.inscricao}</td>
            <td>${c.nome}</td>
            <td>${c.p1.toFixed(2)}</td>
            <td>${c.p2.toFixed(2)}</td>
            <td>${c.p3.toFixed(2)}</td>
            <td>${c.p4.toFixed(2)}</td>
            <td><mark>${c.final.toFixed(2)}</mark></td>
        </tr>
        `;
    });

    html += "</tbody></table>";
    document.getElementById("tabelaResultado").innerHTML = html;
}

function filtrarTabela(){
    const termo = document.getElementById("busca").value.toLowerCase();
    const filtrados = candidatosOrdenados.filter(c =>
        c.nome.toLowerCase().includes(termo) ||
        c.inscricao.toLowerCase().includes(termo)
    );
    mostrarTabela(filtrados);
}

function gerarCSV(){
    let csv = "Classificacao,Inscricao,Nome,P1,P2,P3,P4,Nota Final\n";
    candidatosOrdenados.forEach((c,i)=>{
        csv += `${i+1},${c.inscricao},${c.nome},${c.p1},${c.p2},${c.p3},${c.p4},${c.final.toFixed(2)}\n`;
    });
    return csv;
}

function downloadCSV(){
    if(candidatosOrdenados.length === 0){ alert("Lista vazia!"); return; }
    const csv = gerarCSV();
    const blob = new Blob(["\ufeff"+csv], {type:"text/csv;charset=utf-8;"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "classificacao_final.csv";
    link.click();
}

function downloadXLS(){
    if(candidatosOrdenados.length === 0){ alert("Lista vazia!"); return; }
    let tabela = `<table border="1"><tr><th>Posição</th><th>Inscricao</th><th>Nome</th><th>P1</th><th>P2</th><th>P3</th><th>P4</th><th>Nota Final</th></tr>`;
    candidatosOrdenados.forEach((c,i)=>{
        tabela += `<tr><td>${i+1}</td><td>${c.inscricao}</td><td>${c.nome}</td><td>${c.p1}</td><td>${c.p2}</td><td>${c.p3}</td><td>${c.p4}</td><td>${c.final.toFixed(2)}</td></tr>`;
    });
    tabela += "</table>";
    const blob = new Blob([tabela], {type:"application/vnd.ms-excel"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "classificacao_final.xls";
    link.click();
}
</script>

</body>
</html>
